services:

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    depends_on:
      - pocketbase

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./dashboard/.env
    depends_on:
      - backend
